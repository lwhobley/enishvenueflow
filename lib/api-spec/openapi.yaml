openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VenueFlow API - Hospitality venue management SaaS
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: venues
    description: Venue management
  - name: users
    description: User management
  - name: roles
    description: Role management
  - name: schedules
    description: Schedule management
  - name: shifts
    description: Shift management
  - name: shiftRequests
    description: Shift request management
  - name: reservations
    description: Reservation management
  - name: waitlist
    description: Waitlist management
  - name: guests
    description: Guest CRM
  - name: timeClock
    description: Time clock management
  - name: timeOff
    description: Time off request management
  - name: floorPlan
    description: Floor plan management
  - name: tables
    description: Table management
  - name: tipPool
    description: Tip pool management
  - name: payroll
    description: Payroll management
  - name: documents
    description: Document management
  - name: messaging
    description: Messaging
  - name: notifications
    description: Notifications
  - name: analytics
    description: Analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Venues ──────────────────────────────────────────────────────────────────
  /venues:
    get:
      operationId: listVenues
      tags: [venues]
      summary: List all venues
      responses:
        "200":
          description: List of venues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venue"
    post:
      operationId: createVenue
      tags: [venues]
      summary: Create a venue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVenueBody"
      responses:
        "201":
          description: Created venue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"

  /venues/{id}:
    put:
      operationId: updateVenue
      tags: [venues]
      summary: Update venue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVenueBody"
      responses:
        "200":
          description: Updated venue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"

  # ── Users ────────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users for venue
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Roles ────────────────────────────────────────────────────────────────────
  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List roles for venue
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      operationId: createRole
      tags: [roles]
      summary: Create role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleBody"
      responses:
        "201":
          description: Created role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /roles/{id}:
    put:
      operationId: updateRole
      tags: [roles]
      summary: Update role permissions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleBody"
      responses:
        "200":
          description: Updated role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
    delete:
      operationId: deleteRole
      tags: [roles]
      summary: Delete role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Schedules ─────────────────────────────────────────────────────────────────
  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List schedules for venue
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Create schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleBody"
      responses:
        "201":
          description: Created schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /schedules/{id}/publish:
    put:
      operationId: publishSchedule
      tags: [schedules]
      summary: Publish schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /schedules/ai-generate:
    post:
      operationId: aiGenerateSchedule
      tags: [schedules]
      summary: AI-generate a week of shifts using Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiGenerateScheduleBody"
      responses:
        "200":
          description: Generated shifts preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiGenerateScheduleResponse"

  # ── Shifts ────────────────────────────────────────────────────────────────────
  /shifts:
    get:
      operationId: listShifts
      tags: [shifts]
      summary: List shifts
      parameters:
        - name: scheduleId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
        - name: venueId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"
    post:
      operationId: createShift
      tags: [shifts]
      summary: Create shift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShiftBody"
      responses:
        "201":
          description: Created shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /shifts/open:
    get:
      operationId: listOpenShifts
      tags: [shifts]
      summary: List open shifts for venue
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Open shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"

  /shifts/bulk:
    post:
      operationId: bulkCreateShifts
      tags: [shifts]
      summary: Bulk create shifts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateShiftsBody"
      responses:
        "201":
          description: Created shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"
    delete:
      operationId: bulkDeleteShifts
      tags: [shifts]
      summary: Bulk delete shifts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteShiftsBody"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /shifts/copy-day:
    post:
      operationId: copyShiftsDay
      tags: [shifts]
      summary: Copy shifts from one date to another
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CopyDayBody"
      responses:
        "201":
          description: Copied shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"

  /shifts/bulk-assign:
    put:
      operationId: bulkAssignShifts
      tags: [shifts]
      summary: Bulk assign shifts to user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAssignShiftsBody"
      responses:
        "200":
          description: Assigned shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"

  /shifts/{id}/assign:
    put:
      operationId: assignShift
      tags: [shifts]
      summary: Assign user to shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignShiftBody"
      responses:
        "200":
          description: Updated shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /shifts/{id}/pickup:
    post:
      operationId: pickupShift
      tags: [shifts]
      summary: Employee picks up open shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PickupShiftBody"
      responses:
        "200":
          description: Shift picked up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  # ── Shift Requests ────────────────────────────────────────────────────────────
  /shift-requests:
    get:
      operationId: listShiftRequests
      tags: [shiftRequests]
      summary: List shift requests
      parameters:
        - name: venueId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Shift requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShiftRequest"
    post:
      operationId: createShiftRequest
      tags: [shiftRequests]
      summary: Create shift request (drop/swap/pickup)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShiftRequestBody"
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftRequest"

  /shift-requests/{id}/approve:
    put:
      operationId: approveShiftRequest
      tags: [shiftRequests]
      summary: Approve shift request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftRequest"

  /shift-requests/{id}/reject:
    put:
      operationId: rejectShiftRequest
      tags: [shiftRequests]
      summary: Reject shift request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftRequest"

  # ── Reservations ──────────────────────────────────────────────────────────────
  /reservations:
    get:
      operationId: listReservations
      tags: [reservations]
      summary: List reservations
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
    post:
      operationId: createReservation
      tags: [reservations]
      summary: Create reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationBody"
      responses:
        "201":
          description: Created reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /reservations/{id}:
    put:
      operationId: updateReservation
      tags: [reservations]
      summary: Update reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReservationBody"
      responses:
        "200":
          description: Updated reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
    delete:
      operationId: cancelReservation
      tags: [reservations]
      summary: Cancel reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Waitlist ──────────────────────────────────────────────────────────────────
  /waitlist:
    get:
      operationId: listWaitlist
      tags: [waitlist]
      summary: List waitlist for venue
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Waitlist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaitlistEntry"
    post:
      operationId: addToWaitlist
      tags: [waitlist]
      summary: Add to waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWaitlistEntryBody"
      responses:
        "201":
          description: Created waitlist entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistEntry"

  /waitlist/{id}:
    put:
      operationId: updateWaitlistEntry
      tags: [waitlist]
      summary: Update waitlist entry status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWaitlistEntryBody"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistEntry"

  # ── Guests ────────────────────────────────────────────────────────────────────
  /guests:
    get:
      operationId: listGuests
      tags: [guests]
      summary: List guests
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: vipOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"
    post:
      operationId: createGuest
      tags: [guests]
      summary: Create guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGuestBody"
      responses:
        "201":
          description: Created guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /guests/{id}:
    get:
      operationId: getGuest
      tags: [guests]
      summary: Get guest detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Guest detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
    put:
      operationId: updateGuest
      tags: [guests]
      summary: Update guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuestBody"
      responses:
        "200":
          description: Updated guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
    delete:
      operationId: deleteGuest
      tags: [guests]
      summary: Delete guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Time Clock ────────────────────────────────────────────────────────────────
  /time-clock/in:
    post:
      operationId: clockIn
      tags: [timeClock]
      summary: Clock in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockInBody"
      responses:
        "201":
          description: Clocked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeClockEntry"

  /time-clock/out:
    post:
      operationId: clockOut
      tags: [timeClock]
      summary: Clock out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockOutBody"
      responses:
        "200":
          description: Clocked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeClockEntry"

  /time-clock/active:
    get:
      operationId: listActiveClockIns
      tags: [timeClock]
      summary: List currently clocked in users
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Active clock-ins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeClockEntry"

  /time-clock/entries:
    get:
      operationId: listTimeClockEntries
      tags: [timeClock]
      summary: List time clock entries
      parameters:
        - name: venueId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeClockEntry"

  /time-clock/entries/{id}:
    put:
      operationId: updateTimeClockEntry
      tags: [timeClock]
      summary: Manual edit time clock entry (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTimeClockEntryBody"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeClockEntry"

  # ── Time Off ──────────────────────────────────────────────────────────────────
  /time-off:
    get:
      operationId: listTimeOffRequests
      tags: [timeOff]
      summary: List time-off requests
      parameters:
        - name: venueId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Time-off requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeOffRequest"
    post:
      operationId: createTimeOffRequest
      tags: [timeOff]
      summary: Submit time-off request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimeOffRequestBody"
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeOffRequest"

  /time-off/{id}/approve:
    put:
      operationId: approveTimeOff
      tags: [timeOff]
      summary: Approve time-off request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeOffRequest"

  /time-off/{id}/deny:
    put:
      operationId: denyTimeOff
      tags: [timeOff]
      summary: Deny time-off request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeOffRequest"

  # ── Floor Plan ────────────────────────────────────────────────────────────────
  /floor-sections:
    get:
      operationId: listFloorSections
      tags: [floorPlan]
      summary: List floor sections
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FloorSection"
    post:
      operationId: createFloorSection
      tags: [floorPlan]
      summary: Create floor section
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFloorSectionBody"
      responses:
        "201":
          description: Created section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FloorSection"

  # ── Tables ────────────────────────────────────────────────────────────────────
  /tables:
    get:
      operationId: listTables
      tags: [tables]
      summary: List tables
      parameters:
        - name: venueId
          in: query
          required: true
          schema:
            type: string
        - name: sectionId
          in: query
          schema:
            type: string
      responses:
