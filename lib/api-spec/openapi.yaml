components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    Venue:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        timezone:
          type: string
        subscriptionTier:
          type: string
          enum: [free, pro, enterprise]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, address, timezone, subscriptionTier, isActive, createdAt]

    CreateVenueBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        timezone:
          type: string
        subscriptionTier:
          type: string
          enum: [free, pro, enterprise]
      required: [name, address, timezone]

    UpdateVenueBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        timezone:
          type: string
        subscriptionTier:
          type: string
          enum: [free, pro, enterprise]
        isActive:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: string
        venueId:
          type: string
        fullName:
          type: string
        email:
          type: string
        roleId:
          type: string
          nullable: true
        roleName:
          type: string
          nullable: true
        roleColor:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        isActive:
          type: boolean
        avatarUrl:
          type: string
          nullable: true
        hireDate:
          type: string
          nullable: true
        hourlyRate:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, venueId, fullName, email, isAdmin, isActive, createdAt]

