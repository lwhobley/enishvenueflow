<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1008"/>
      <stop offset="100%" style="stop-color:#0C0806"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C85A"/>
      <stop offset="100%" style="stop-color:#B8882A"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3C00"/>
      <stop offset="60%" style="stop-color:#FF8800"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="110" fill="none" stroke="rgba(201,168,75,0.25)" stroke-width="2"/>
  <!-- Letter E -->
  <text x="168" y="345" font-family="Georgia, serif" font-size="260" font-weight="700" fill="url(#gold)" letter-spacing="-8">E</text>
  <!-- Flame accent -->
  <g transform="translate(340, 95)">
    <ellipse cx="32" cy="80" rx="18" ry="30" fill="url(#flame)" opacity="0.9"/>
    <ellipse cx="32" cy="60" rx="12" ry="22" fill="#FFD700" opacity="0.7"/>
    <ellipse cx="32" cy="48" rx="7" ry="14" fill="white" opacity="0.5"/>
  </g>
</svg>
