# Railway / Nixpacks build configuration for the VenueFlow monorepo.
# Installs pnpm via corepack and builds all workspace packages.

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
# --prod=false forces pnpm to install devDependencies even though
# NODE_ENV=production is set (see [variables] below). vite, tsc,
# esbuild and friends live in devDeps and are required to PRODUCE
# the bundled output. Without this flag pnpm strips them and the
# build phase below fails with "vite: not found".
cmds = ["pnpm install --frozen-lockfile --prod=false"]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"

[variables]
NODE_ENV = "production"
